<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Social Carousel Editor V3</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root{--panel:#111827;--line:#2b3448;--text:#f8fafc;--muted:#9ca3af;--accent:#21a6b8;--danger:#7f1d1d}*{box-sizing:border-box}body{margin:0;height:100vh;overflow:hidden;background:#0b1020;color:var(--text);font-family:Arial,system-ui,sans-serif}.app{display:grid;grid-template-columns:280px 1fr 340px;grid-template-rows:58px 1fr;height:100vh}header{grid-column:1/4;display:flex;gap:10px;align-items:center;padding:10px 14px;background:#0d1426;border-bottom:1px solid var(--line)}h1{font-size:16px;margin:0 8px 0 0}.left,.right{background:var(--panel);overflow:auto;padding:14px}.left{border-right:1px solid var(--line)}.right{border-left:1px solid var(--line)}.stage{overflow:auto;background:#e8e5de;padding:24px}iframe{width:100%;min-height:100%;border:0;background:white;display:block;margin:auto;box-shadow:0 18px 40px rgba(0,0,0,.22);transform-origin:top center}button,input,select,textarea{font:inherit}button{border:1px solid var(--line);background:#172238;color:var(--text);border-radius:10px;padding:8px 10px;cursor:pointer}button:hover{border-color:var(--accent)}button.primary{background:var(--accent);border-color:var(--accent);font-weight:700}.danger{background:#2a1217;border-color:var(--danger)}label{display:block;color:var(--muted);font-size:12px;margin:12px 0 6px}input[type=text],input[type=number],select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px;background:#0f172a;color:var(--text)}input[type=color]{width:100%;height:36px;background:#0f172a;border:1px solid var(--line);border-radius:8px;padding:3px}textarea{min-height:90px;resize:vertical}.section{border-top:1px solid var(--line);padding-top:13px;margin-top:13px}.hint{color:var(--muted);font-size:12px;line-height:1.5}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid button{width:100%}.hidden{display:none!important}.list button{display:block;width:100%;text-align:left;margin:6px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.badge{font-size:11px;color:#a7f3d0;border:1px solid #14532d;background:#052e1b;padding:2px 8px;border-radius:20px}
</style>
</head>
<body>
<div class="app">
<header><h1>Social Carousel Editor <span class="badge">V3</span></h1><button id="load" class="primary">Load social-carousel.html</button><button id="exportOne" class="primary">Export Current PNG</button><button id="exportAll">Export All PNG</button><button id="downloadHtml">Download HTML</button><label style="margin-left:auto;width:150px">Zoom <input id="zoom" type="range" min="35" max="100" value="60"></label></header>
<aside class="left">
<h3>Import</h3><input id="htmlFile" type="file" accept=".html,.htm"><p class="hint">If loading from GitHub or local server fails, choose your edited social-carousel.html here.</p>
<div class="section"><h3>Selection</h3><input id="selectedInfo" readonly value="No selection"><div class="grid" style="margin-top:8px"><button id="parentPage">Select Slide</button><button id="parentCard">Select Card</button><button id="parentTable">Select Table</button><button id="duplicate">Duplicate</button></div><button id="deleteEl" class="danger" style="width:100%;margin-top:8px">Delete selected</button></div>
<div class="section"><h3>Add</h3><div class="grid"><button id="addText">Add Text</button><button id="addCard">Add Card</button><button id="addImageCard">Add Image Card</button><button id="renumber">Renumber</button></div></div>
<div class="section"><h3>Auto Layout</h3><div class="grid"><button id="cleanPos">Clean Position</button><button id="fillBlank">Fill Blank Area</button><button id="movePrev">Move Prev</button><button id="moveNext">Move Next</button></div><button id="pullNext" style="width:100%;margin-top:8px">Pull From Next Slide</button><p class="hint">These are layout helpers. Use them first, then manually fine tune.</p></div>
<div class="section"><h3>Slides</h3><button id="scanSlides" style="width:100%">Rescan Slides</button><div id="slideList" class="list hint"></div></div>
</aside>
<main class="stage"><iframe id="frame"></iframe></main>
<aside class="right">
<div id="empty" class="hint">Select something in the slide to edit.</div>
<div id="panel" class="hidden">
<div class="section"><h3>Text</h3><label>Content</label><textarea id="textContent"></textarea><button id="applyText">Apply text</button><label>Font</label><select id="fontFamily"><option value="">No change</option><option value="Arial, sans-serif">Arial</option><option value="Georgia, serif">Georgia</option><option value="Inter, Arial, sans-serif">Inter</option></select><div class="grid"><div><label>Size px</label><input id="fontSize" type="number" min="8" max="160"></div><div><label>Line height</label><input id="lineHeight" type="number" min="0.8" max="3" step="0.1"></div></div><label>Text color</label><input id="textColor" type="color"><label>Weight</label><select id="fontWeight"><option value="">No change</option><option value="400">Regular</option><option value="700">Bold</option><option value="900">Heavy</option></select><label>Align</label><select id="textAlign"><option value="">No change</option><option value="left">Left</option><option value="center">Center</option><option value="right">Right</option><option value="justify">Justify</option></select></div>
<div class="section"><h3>Box</h3><label>Background</label><input id="bg" type="color"><label>Border color</label><input id="borderColor" type="color"><div class="grid"><div><label>Border px</label><input id="borderWidth" type="number" min="0" max="30"></div><div><label>Radius px</label><input id="radius" type="number" min="0" max="120"></div></div><div class="grid"><div><label>Padding px</label><input id="padding" type="number" min="0" max="160"></div><div><label>Margin bottom</label><input id="marginBottom" type="number" min="0" max="200"></div></div><div class="grid"><div><label>Width</label><input id="boxWidth" type="text" placeholder="100% or 600px"></div><div><label>Height</label><input id="boxHeight" type="text" placeholder="auto or 300px"></div></div></div>
<div class="section"><h3>Image</h3><label>Replace selected image</label><input id="replaceImage" type="file" accept="image/*"><label>Insert image into selected box</label><input id="insertImageFile" type="file" accept="image/*"><div class="grid" style="margin-top:8px"><button id="insertImage">Insert</button><button id="insertCoverImage">Cover</button></div><button id="coverParent" style="width:100%;margin-top:8px">Make image fill parent</button><label>Object fit</label><select id="fit"><option value="">No change</option><option value="cover">Cover</option><option value="contain">Contain</option><option value="fill">Stretch</option></select></div>
</div>
</aside>
</div>
<script>
const frame=document.getElementById('frame');let selected=null;const $=id=>document.getElementById(id);function d(){return frame.contentDocument||frame.contentWindow.document}function w(){return frame.contentWindow}function st(el){return w().getComputedStyle(el)}function isImg(el){return el&&el.tagName&&el.tagName.toLowerCase()==='img'}function lab(el){if(!el)return'No selection';let c=el.className?'.'+String(el.className).trim().replace(/\s+/g,'.'):'';return el.tagName.toLowerCase()+c}function hex(v){if(!v)return'#ffffff';if(v[0]=='#')return v;let m=v.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);return m?'#'+[m[1],m[2],m[3]].map(x=>(+x).toString(16).padStart(2,'0')).join(''):'#ffffff'}
async function load(){try{let h=await fetch('social-carousel.html').then(r=>r.text());openHtml(h)}catch(e){alert('Could not load social-carousel.html. Please choose the file from the left import area.')}}
function openHtml(h){frame.srcdoc=h;frame.onload=()=>{inject();scanSlides()}}
function inject(){let doc=d();let style=doc.getElementById('__social_editor_style');if(!style){style=doc.createElement('style');style.id='__social_editor_style';style.textContent='[data-se-selected="true"]{outline:3px solid #21a6b8!important;outline-offset:4px!important}.se-text{font-family:Arial,sans-serif;font-size:42px;line-height:1.25;color:#1f6672;font-weight:700;margin:18px 0}.se-card{background:#fbf7ee;border:1px solid #ddd3c2;border-radius:16px;padding:22px;margin:20px 0}.se-image-card{height:360px;overflow:hidden;padding:0}.se-image-card img{width:100%;height:100%;object-fit:cover;display:block}';doc.head.appendChild(style)}doc.body.contentEditable='false';doc.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();select(e.target)},true)}
function select(el){if(!el||el.id==='__social_editor_style')return;if(selected)selected.removeAttribute('data-se-selected');selected=el;selected.setAttribute('data-se-selected','true');$('selectedInfo').value=lab(el);$('empty').classList.add('hidden');$('panel').classList.remove('hidden');fillPanel()}
function fillPanel(){let s=st(selected);$('textContent').value=isImg(selected)?(selected.alt||''):(selected.innerText||selected.textContent||'');$('fontSize').value=parseInt(s.fontSize)||'';$('lineHeight').value=parseFloat(s.lineHeight)||'';$('textColor').value=hex(s.color);$('bg').value=hex(s.backgroundColor);$('borderColor').value=hex(s.borderTopColor);$('borderWidth').value=parseInt(s.borderTopWidth)||0;$('radius').value=parseInt(s.borderTopLeftRadius)||0;$('padding').value=parseInt(s.paddingTop)||0;$('marginBottom').value=parseInt(s.marginBottom)||0;$('boxWidth').value=selected.style.width||'';$('boxHeight').value=selected.style.height||''}
function page(){return selected&&selected.closest('.page')||d().querySelector('.page')}function box(){return selected&&selected.closest('.card,.note,.reminder,.page,section,div,article')||selected}
function addText(){let p=page();let el=d().createElement('div');el.className='se-text';el.textContent='New text block';p.insertBefore(el,p.querySelector('.footer'));select(el)}function addCard(img=false){let p=page();let el=d().createElement('div');el.className=img?'se-card se-image-card':'se-card';el.innerHTML=img?'<img alt="New image">':'<h3>New Card Title</h3><p>Edit this text from the right panel.</p>';p.insertBefore(el,p.querySelector('.footer'));select(img?el.querySelector('img'):el)}
function del(){if(!selected)return;if(!confirm('Delete selected?'))return;let n=selected;selected=null;n.remove();$('selectedInfo').value='No selection';$('panel').classList.add('hidden');$('empty').classList.remove('hidden');scanSlides()}
function duplicate(){if(!selected)return;let c=selected.cloneNode(true);selected.after(c);select(c)}function cleanPos(){let p=page();p.querySelectorAll('*').forEach(el=>{el.style.transform='';});}function fillBlank(){let p=page();let blocks=[...p.children].filter(x=>!x.classList.contains('footer'));let last=blocks[blocks.length-1];if(last){last.style.minHeight='220px';last.style.marginTop='30px';}}function moveTo(delta){if(!selected)return;let pages=[...d().querySelectorAll('.page')];let p=selected.closest('.page');let i=pages.indexOf(p)+delta;if(i<0||i>=pages.length)return;pages[i].insertBefore(selected,pages[i].querySelector('.footer'));select(selected);renumber();scanSlides()}function pullNext(){let pages=[...d().querySelectorAll('.page')];let p=page();let i=pages.indexOf(p);if(i<0||i>=pages.length-1)return;let next=pages[i+1];let cand=[...next.children].find(x=>!x.classList.contains('footer')&&!x.matches('h1,h2'));if(cand){p.insertBefore(cand,p.querySelector('.footer'));select(cand);renumber();scanSlides()}}
function renumber(){let pages=[...d().querySelectorAll('.page')];pages.forEach((p,i)=>{let pn=p.querySelector('.page-num');if(pn)pn.textContent=(i+1)+' / '+pages.length})}function scanSlides(){let box=$('slideList');box.innerHTML='';[...d().querySelectorAll('.page')].forEach((p,i)=>{let b=document.createElement('button');b.textContent='Slide '+(i+1);b.onclick=()=>select(p);box.appendChild(b)})}
function apply(){if(!selected)return;let ss=selected.style;if($('fontFamily').value)ss.fontFamily=$('fontFamily').value;if($('fontSize').value)ss.fontSize=$('fontSize').value+'px';if($('lineHeight').value)ss.lineHeight=$('lineHeight').value;ss.color=$('textColor').value;if($('fontWeight').value)ss.fontWeight=$('fontWeight').value;if($('textAlign').value)ss.textAlign=$('textAlign').value;ss.background=$('bg').value;ss.borderColor=$('borderColor').value;ss.borderStyle='solid';ss.borderWidth=$('borderWidth').value+'px';ss.borderRadius=$('radius').value+'px';ss.padding=$('padding').value+'px';ss.marginBottom=$('marginBottom').value+'px';if($('boxWidth').value)ss.width=$('boxWidth').value;if($('boxHeight').value)ss.height=$('boxHeight').value;if(isImg(selected)&&$('fit').value)ss.objectFit=$('fit').value}
function fileData(f,cb){if(!f){alert('Please choose an image first.');return}let r=new FileReader();r.onload=()=>cb(r.result);r.readAsDataURL(f)}function setImg(img,src,cover){img.src=src;img.style.display='block';img.style.width='100%';if(cover){img.style.height='100%';img.style.objectFit='cover'}select(img)}function insertImg(cover){let f=$('insertImageFile').files[0];fileData(f,src=>{let b=box();let img=b.querySelector('img')||d().createElement('img');if(!img.parentElement)b.prepend(img);if(cover){b.style.height=b.style.height||'360px';b.style.overflow='hidden';b.style.padding='0'}setImg(img,src,cover)})}function coverParent(){if(!isImg(selected)){alert('Select an image first.');return}let p=selected.parentElement;p.style.height=p.style.height||'360px';p.style.overflow='hidden';p.style.padding='0';setImg(selected,selected.src,true)}
function cleanHtml(){if(selected)selected.removeAttribute('data-se-selected');let s=d().getElementById('__social_editor_style');if(s)s.remove();return '<!DOCTYPE html>\n'+d().documentElement.outerHTML}function dl(name,blob){let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}async function exportPage(p,i){if(selected)selected.removeAttribute('data-se-selected');let canvas=await html2canvas(p,{backgroundColor:null,scale:1,useCORS:true,width:1080,height:1350,windowWidth:1200,windowHeight:1500});canvas.toBlob(b=>dl('falcon-t1-slide-'+String(i).padStart(2,'0')+'.png',b),'image/png')}async function exportCurrent(){let p=page();await exportPage(p,[...d().querySelectorAll('.page')].indexOf(p)+1)}async function exportAll(){let pages=[...d().querySelectorAll('.page')];for(let i=0;i<pages.length;i++){await exportPage(pages[i],i+1);await new Promise(r=>setTimeout(r,350))}}
$('load').onclick=load;$('zoom').oninput=e=>frame.style.transform='scale('+(e.target.value/100)+')';$('htmlFile').onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>openHtml(r.result);r.readAsText(f)};$('parentPage').onclick=()=>select(page());$('parentCard').onclick=()=>select(box());$('parentTable').onclick=()=>{let t=selected&&selected.closest('table');if(t)select(t);else alert('No table found')};$('deleteEl').onclick=del;$('duplicate').onclick=duplicate;$('addText').onclick=addText;$('addCard').onclick=()=>addCard(false);$('addImageCard').onclick=()=>addCard(true);$('cleanPos').onclick=cleanPos;$('fillBlank').onclick=fillBlank;$('movePrev').onclick=()=>moveTo(-1);$('moveNext').onclick=()=>moveTo(1);$('pullNext').onclick=pullNext;$('renumber').onclick=renumber;$('scanSlides').onclick=scanSlides;$('applyText').onclick=()=>{if(!selected)return;if(isImg(selected))selected.alt=$('textContent').value;else selected.innerText=$('textContent').value};['fontFamily','fontSize','lineHeight','textColor','fontWeight','textAlign','bg','borderColor','borderWidth','radius','padding','marginBottom','boxWidth','boxHeight','fit'].forEach(id=>$(id).onchange=apply);$('replaceImage').onchange=e=>{if(!isImg(selected)){alert('Select an image first.');return}fileData(e.target.files[0],src=>setImg(selected,src,false))};$('insertImage').onclick=()=>insertImg(false);$('insertCoverImage').onclick=()=>insertImg(true);$('coverParent').onclick=coverParent;$('exportOne').onclick=exportCurrent;$('exportAll').onclick=exportAll;$('downloadHtml').onclick=()=>dl('social-carousel-edited.html',new Blob([cleanHtml()],{type:'text/html'}));frame.style.transform='scale(.6)';load();
</script>
</body>
</html>
